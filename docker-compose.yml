services:
  postgres:
    image: postgres:16-alpine
    container_name: bl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backlink_secret}
      POSTGRES_DB: ${POSTGRES_DB:-backlink_engine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backlink} -d ${POSTGRES_DB:-backlink_engine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: bl-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD:-redis_default_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_default_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bl-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    volumes:
      - /var/log/pmta:/var/log/pmta:ro
      - /var/log/mail.log:/var/log/mail.log:ro
      # Mount host /var/mail so the app can read/write per-mailbox Maildirs
      # (replies, presse-*). Needed by the /mailboxes feature (inbox viewer
      # + compose/reply). Read-write so the UI can move messages to cur/
      # on read and to Trash/ on delete. The container runs as node (uid
      # 1000) but Maildir files are owned by the local mail users — we
      # use doveadm-style flag renaming which doesn't require ownership.
      - /var/mail:/var/mail
    environment:
      # DATABASE_URL, REDIS_URL, OPEN_PAGERANK_API_KEY come from .env
      NODE_ENV: production
      VPS_HOST_IP: "204.168.180.175"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # bl-nginx DISABLED — host nginx on the VPS already serves the frontend from
  # /opt/backlink-engine/frontend-static and proxies /api to bl-app on 127.0.0.1:3000.
  # Re-enable only if you need an in-container nginx (conflicts with host port 80).
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: bl-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./deploy/nginx-http-only.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./frontend/dist:/usr/share/nginx/html:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
