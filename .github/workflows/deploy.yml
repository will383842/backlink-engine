name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            # Install Docker Compose plugin if not present
            if ! docker compose version &> /dev/null; then
              echo "Installing Docker Compose..."
              apt-get update && apt-get install -y docker-compose-plugin
            fi

            # Clone or pull the project
            if [ ! -d /opt/backlink-engine ]; then
              echo "Cloning project..."
              git clone https://github.com/will383842/backlink-engine.git /opt/backlink-engine
            fi

            cd /opt/backlink-engine
            git fetch origin main
            git reset --hard origin/main

            # Ensure .env exists
            if [ ! -f .env ]; then
              cp .env .env.backup 2>/dev/null || true
              echo "⚠️ No .env file found, using defaults from repo"
            fi

            # Build and deploy
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d --build

            # Wait for the app container to be up before extracting the frontend dist
            sleep 10

            # Apply pending Prisma migrations. Fail the deploy loudly if any
            # migration errors out — do NOT silently continue with a DB in an
            # inconsistent state. `migrate deploy` is idempotent: already-applied
            # migrations are skipped.
            echo "Running prisma migrate deploy..."
            docker exec bl-app npx prisma migrate deploy

            # Sync freshly-built frontend dist from the container into the host
            # nginx static directory (nginx serves /opt/backlink-engine/frontend-static).
            if [ -d /opt/backlink-engine/frontend-static ]; then
              rm -rf /opt/backlink-engine/frontend-static/*
              docker cp bl-app:/app/frontend/dist/. /opt/backlink-engine/frontend-static/
              echo "✅ Frontend static files synced to host."
            fi

            curl -sf http://localhost:3000/api/health && echo "✅ Deploy complete!" || echo "⚠️ Health check failed"
